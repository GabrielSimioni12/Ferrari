<!DOCTYPE html>
<html class="dark" lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ferrari | Global Network Locator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#c20a0a", "background-dark": "#050505", "surface-dark": "#111111" },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c20a0a; }
        .active-dealer { border-left: 4px solid #c20a0a !important; background: #1a1a1a !important; }
        .dealer-image { width: 65px; height: 65px; background-size: cover; background-position: center; border-radius: 2px; }
        
        /* Ajuste da logo no marcador */
        .marker-logo {
            width: 40px;
            height: 55px;
            object-fit: contain;
            filter: brightness(0) invert(1); /* Deixa a logo branca para destacar no vermelho */
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden">

<div class="flex h-screen w-full flex-col">
    <header class="flex items-center justify-between border-b border-white/5 bg-background-dark px-8 py-4 z-50">
        <div class="flex items-center gap-4">
            <img src="./images/icons/ferrari_transparente_logo.png" class="w-8 h-8 brightness-0 invert" alt="Ferrari Logo">
            <h1 class="text-xl font-black uppercase tracking-[0.4em] italic text-primary">Ferrari</h1>
        </div>
        <button class="bg-white text-black text-[9px] font-extrabold px-6 py-2 uppercase tracking-widest hover:bg-primary hover:text-white transition-all">
            MyFerrari Login
        </button>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <aside class="w-full max-w-[380px] bg-surface-dark border-r border-white/5 flex flex-col z-40 shadow-2xl">
            <div class="p-6 border-b border-white/5">
                <div class="flex items-center gap-3 mb-6">
                    <h2 class="text-xl font-extrabold uppercase italic tracking-tighter">Global Network</h2>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">search</span>
                    <input class="w-full bg-black border border-white/10 py-3 pl-10 pr-4 text-[10px] text-white outline-none focus:border-primary uppercase tracking-widest" placeholder="Search City..."/>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2">
                <div class="dealer-item p-4 border border-white/5 flex gap-4 cursor-pointer active-dealer transition-all" data-x="51" data-y="38" data-name="Maranello">
                    <div class="dealer-image shrink-0 shadow-lg" style="background-image: url('./images/icons/ferrari_logo.png')"></div>
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-wider text-white">Ferrari Maranello</h3>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase">Italy</p>
                    </div>
                </div>

                <div class="dealer-item p-4 border border-white/5 flex gap-4 cursor-pointer transition-all" data-x="28" data-y="37" data-name="New York">
                    <div class="dealer-image shrink-0 shadow-lg" style="background-image: url('https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&q=60&w=150')"></div>
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-wider text-white">Ferrari New York</h3>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase">USA</p>
                    </div>
                </div>

                <div class="dealer-item p-4 border border-white/5 flex gap-4 cursor-pointer transition-all" data-x="34" data-y="75" data-name="São Paulo">
                    <div class="dealer-image shrink-0 shadow-lg" style="background-image: url('https://images.unsplash.com/photo-1614200187524-dc4b892acf16?auto=format&fit=crop&q=60&w=150')"></div>
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-wider text-white">Ferrari São Paulo</h3>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase">Brazil</p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-1 relative bg-black overflow-hidden">
            <img class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale brightness-50" 
                 src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&q=80&w=2000" alt="World Map"/>
            
            <div id="mapMarker" class="absolute top-[38%] left-[51%] z-30 transition-all duration-700 ease-out -translate-x-1/2 -translate-y-full">
                <div class="flex flex-col items-center">
                    <div class="w-14 h-14 bg-primary/20 rounded-full animate-ping absolute top-0"></div>
                    
                    <div class="relative bg-white p-[2px] shadow-[0_0_40px_rgba(194,10,10,0.7)] border border-primary">
                        <div class="bg-primary px-4 py-4 flex flex-col items-center min-w-[110px]">
                            <img src="./images/icons/ferrari_transparente_logo.png" 
                                 class="marker-logo mb-3" alt="Ferrari Logo">
                            
                            <span id="markerLabel" class="text-[11px] font-black text-white uppercase tracking-tighter border-t border-white/20 pt-2 w-full text-center">Maranello</span>
                        </div>
                    </div>
                    <div class="w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[14px] border-t-white"></div>
                </div>
            </div>

        
        </section>
    </main>
</div>

<script>
    const dealers = document.querySelectorAll('.dealer-item');
    const marker = document.getElementById('mapMarker');
    const markerLabel = document.getElementById('markerLabel');

    dealers.forEach(dealer => {
        dealer.addEventListener('click', () => {
            dealers.forEach(d => d.classList.remove('active-dealer'));
            dealer.classList.add('active-dealer');

            const x = dealer.getAttribute('data-x');
            const y = dealer.getAttribute('data-y');
            const name = dealer.getAttribute('data-name');

            marker.style.left = x + '%';
            marker.style.top = y + '%';
            markerLabel.innerText = name;
        });
    });
</script>

</body>
</html>
